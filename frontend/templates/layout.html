<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Rising Waters is an AI-powered flood prediction platform for proactive disaster preparedness.">
    <meta name="keywords" content="flood prediction, AI flood forecasting, machine learning, weather analysis, disaster preparedness">
    <meta property="og:title" content="Rising Waters | AI Flood Prediction Platform">
    <meta property="og:description" content="Explore a premium AI experience for flood risk forecasting and safety recommendations.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{{ url_for('static', filename='images/hero.svg') }}">
    <title>Rising Waters | AI Flood Prediction Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/hero.svg') }}">
  </head>
  <body id="top">
    <header class="site-header sticky-top">
      <nav class="navbar navbar-expand-lg container py-3" aria-label="Main navigation">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('main.home') }}">
          <span class="brand-mark">RW</span>
          <span class="fw-bold">Rising Waters</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="siteNav">
          <ul class="navbar-nav align-items-lg-center gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.home') }}">About</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.predict') }}">Predict</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 py-4 text-center text-md-start">
        <span>© 2026 Rising Waters. Designed for modern flood intelligence.</span>
        <span>Built with Flask, Bootstrap, and AI-driven forecasting.</span>
      </div>
    </footer>

    <a href="#top" class="scroll-top" aria-label="Scroll to top">
      <i class="bi bi-arrow-up"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/validation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
  </body>
</html>
