{% extends 'layout.html' %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 reveal">
      <div class="status-card text-center">
        <div class="display-1 fw-bold" style="color: var(--primary);">404</div>
        <h1 class="display-6 fw-bold mt-3 mb-3">Page not found</h1>
        <p class="lead text-muted">The page you were looking for has moved or no longer exists.</p>
        <a class="btn btn-primary btn-lg px-4 mt-3" href="{{ url_for('main.home') }}">Return Home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
